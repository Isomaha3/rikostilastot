<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persutilastot</title>
<style>
:root{--bg:#0d0f12;--bg2:#141720;--bg3:#1c2030;--border:rgba(255,255,255,0.09);--text:#e8eaf0;--muted:#7a8099;--dim:#4a5068;--accent:#4f8ef7;--red:#e05c5c;--green:#3dba8c;--amber:#e8a23a;--purple:#9b7de8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;padding-bottom:72px;}

/* TOP BAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar h1{font-size:15px;font-weight:600;}
.topbar small{font-size:11px;color:var(--muted);}

/* BOTTOM NAV */
.botnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;overflow-x:auto;z-index:100;-webkit-overflow-scrolling:touch;}
.botnav::-webkit-scrollbar{display:none;}
.bn{flex:0 0 auto;padding:10px 14px 12px;text-align:center;cursor:pointer;color:var(--dim);font-size:10px;min-width:64px;border:none;background:none;transition:color .15s;}
.bn.active{color:var(--accent);}
.bn-dot{width:6px;height:6px;border-radius:50%;margin:0 auto 4px;}

/* CONTENT */
.content{padding:14px;}
.panel{display:none;}
.panel.active{display:block;}

/* METRIC CARDS */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;}
.mc3{grid-column:1/-1;}
.mlabel{font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.mval{font-size:24px;font-weight:300;line-height:1;margin-bottom:3px;}
.mval.r{color:var(--red);}
.mval.g{color:var(--green);}
.mval.a{color:var(--accent);}
.msub{font-size:11px;color:var(--dim);}
.tu{display:inline-block;padding:1px 7px;border-radius:4px;font-size:11px;background:rgba(224,92,92,.12);color:var(--red);}
.td{display:inline-block;padding:1px 7px;border-radius:4px;font-size:11px;background:rgba(61,186,140,.12);color:var(--green);}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.ctitle{font-size:13px;font-weight:500;margin-bottom:3px;}
.csub{font-size:11px;color:var(--muted);margin-bottom:12px;}

/* PURE CSS LINE CHART */
.linechart{position:relative;height:160px;margin:4px 0;}
.lc-svg{width:100%;height:100%;}

/* BAR CHART (horizontal) */
.barchart{display:flex;flex-direction:column;gap:7px;margin-top:4px;}
.bc-row{display:flex;align-items:center;gap:8px;}
.bc-label{font-size:11px;color:var(--muted);min-width:80px;flex-shrink:0;}
.bc-track{flex:1;height:8px;background:var(--border);border-radius:3px;overflow:hidden;}
.bc-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.bc-val{font-size:11px;color:var(--text);min-width:44px;text-align:right;flex-shrink:0;}

/* STACKED BAR */
.sbarchart{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.sbc-row{display:flex;align-items:center;gap:8px;}
.sbc-label{font-size:10px;color:var(--muted);min-width:32px;flex-shrink:0;text-align:center;}
.sbc-track{flex:1;height:14px;background:var(--border);border-radius:3px;overflow:hidden;display:flex;}
.sbc-seg{height:100%;}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* INFO BOX */
.ibox{background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.2);border-radius:8px;padding:11px 14px;margin-bottom:14px;font-size:12px;color:var(--muted);line-height:1.6;}
.ibox.amber{background:rgba(232,162,58,.06);border-color:rgba(232,162,58,.25);}
.ibox strong{color:var(--text);font-weight:500;}
.dbox{background:rgba(74,80,104,.15);border:1px solid rgba(122,128,153,.2);border-radius:8px;padding:9px 13px;margin-bottom:14px;font-size:11px;color:var(--dim);line-height:1.5;display:flex;align-items:flex-start;gap:7px;}
.dbox-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:3px;}
.abox{background:var(--bg3);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:11px 14px;margin-top:12px;font-size:12px;color:var(--muted);line-height:1.7;}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.comp-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;}
.comp-num{font-size:32px;font-weight:300;line-height:1;margin-bottom:3px;}
.comp-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:6px 0 4px;}
.comp-fill{height:100%;border-radius:3px;}
.comp-note{font-size:11px;color:var(--dim);}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1 id="ttitle">Persutilastot</h1>
    <small>Tilastokeskus &amp; Rise · <span id="datarange">2015–2024</span></small>
  </div>
</div>

<div class="content">
  <div id="p-vakivalta" class="panel active"></div>
  <div id="p-seksuaali" class="panel"></div>
  <div id="p-henki" class="panel"></div>
  <div id="p-ryostot" class="panel"></div>
  <div id="p-nuoriso" class="panel"></div>
  <div id="p-perhe" class="panel"></div>
  <div id="p-maahanmuuttajat" class="panel"></div>
  <div id="p-kansalaisuus" class="panel"></div>
  <div id="p-vangit" class="panel"></div>
  <div id="p-syntyperä" class="panel"></div>
  <div id="p-ennakko2025" class="panel"></div>
  <div id="p-ika" class="panel"></div>
</div>

<nav class="botnav">
  <button class="bn active" data-p="vakivalta" onclick="go(this)"><div class="bn-dot" style="background:#e05c5c"></div>Väkivalta</button>
  <button class="bn" data-p="seksuaali" onclick="go(this)"><div class="bn-dot" style="background:#e8a23a"></div>Seksuaali</button>
  <button class="bn" data-p="henki" onclick="go(this)"><div class="bn-dot" style="background:#9b7de8"></div>Henkirikokset</button>
  <button class="bn" data-p="ryostot" onclick="go(this)"><div class="bn-dot" style="background:#4f8ef7"></div>Ryöstöt</button>
  <button class="bn" data-p="nuoriso" onclick="go(this)"><div class="bn-dot" style="background:#e06898"></div>Nuoriso</button>
  <button class="bn" data-p="perhe" onclick="go(this)"><div class="bn-dot" style="background:#e05c8a"></div>Perheväkivalta</button>
  <button class="bn" data-p="maahanmuuttajat" onclick="go(this)"><div class="bn-dot" style="background:#3dba8c"></div>Maahanmuuttajat</button>
  <button class="bn" data-p="kansalaisuus" onclick="go(this)"><div class="bn-dot" style="background:#3ab8c8"></div>Kansalaisuus</button>
  <button class="bn" data-p="vangit" onclick="go(this)"><div class="bn-dot" style="background:#9b7de8"></div>Vangit</button>
  <button class="bn" data-p="syntyperä" onclick="go(this)"><div class="bn-dot" style="background:#e8a23a"></div>Syntyperä</button>
  <button class="bn" data-p="ennakko2025" onclick="go(this)"><div class="bn-dot" style="background:#3dba8c"></div>2025 uudet</button>
  <button class="bn" data-p="ika" onclick="go(this)"><div class="bn-dot" style="background:#e8a23a"></div>Ikä &amp; tausta</button>
</nav>

<script>
const TITLES={vakivalta:'Väkivaltarikokset',seksuaali:'Seksuaalirikokset',henki:'Henkirikokset',ryostot:'Ryöstöt',nuoriso:'Nuorisorikollisuus',perhe:'Perhe- ja lähisuhdeväkivalta',maahanmuuttajat:'Maahanmuuttajat vs. kantaväestö',kansalaisuus:'Kansalaisuuksittain',vangit:'Ulkomaalaiset vangit','syntyperä':'Syntyperä vs. vangit',ennakko2025:'2025 ennakkotiedot (Q1–Q3)',ika:'Ikäjakauma & tausta'};
const Y=['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];

function fi(n){return Math.round(n).toLocaleString('fi-FI');}

// ── SVG LINE CHART ──────────────────────────────────────
function lineChart(datasets, yMin, yMax, yFmt){
  const W=340,H=140,PL=46,PR=10,PT=10,PB=24;
  const cW=W-PL-PR, cH=H-PT-PB;
  const xStep=cW/(datasets[0].data.length-1);
  const yRange=yMax-yMin;
  function px(i){return PL+i*xStep;}
  function py(v){return PT+cH-(v-yMin)/yRange*cH;}

  let paths='';
  datasets.forEach(d=>{
    const pts=d.data.map((v,i)=>px(i)+','+py(v)).join(' ');
    if(d.fill){
      const first=d.data[0],last=d.data[d.data.length-1];
      paths+=`<polygon points="${PL},${PT+cH} ${pts} ${px(d.data.length-1)},${PT+cH}" fill="${d.color}18"/>`;
    }
    paths+=`<polyline points="${pts}" fill="none" stroke="${d.color}" stroke-width="${d.width||2}" stroke-dasharray="${d.dash||''}" stroke-linejoin="round"/>`;
    // last point dot
    const li=d.data.length-1;
    paths+=`<circle cx="${px(li)}" cy="${py(d.data[li])}" r="4" fill="${d.color}"/>`;
  });

  // y axis labels
  let yLabels='';
  const steps=4;
  for(let i=0;i<=steps;i++){
    const v=yMin+(yRange/steps)*i;
    const y=py(v);
    yLabels+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="10" fill="#7a8099">${yFmt?yFmt(v):fi(v)}</text>`;
    yLabels+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>`;
  }

  // x axis labels — show every other
  let xLabels='';
  Y.forEach((yr,i)=>{
    if(i%2===0||i===Y.length-1){
      xLabels+=`<text x="${px(i)}" y="${H-4}" text-anchor="middle" font-size="10" fill="#7a8099">${yr}</text>`;
    }
  });

  return `<div class="linechart"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%">${yLabels}${xLabels}${paths}</svg></div>`;
}

// ── HORIZONTAL BAR CHART ────────────────────────────────
function hbars(rows){
  const max=Math.max(...rows.map(r=>r.v));
  return '<div class="barchart">'+rows.map(r=>`
  <div class="bc-row">
    <span class="bc-label">${r.l}</span>
    <div class="bc-track"><div class="bc-fill" style="width:${(r.v/max*100).toFixed(1)}%;background:${r.c}"></div></div>
    <span class="bc-val">${r.fmt||fi(r.v)}</span>
  </div>`).join('')+'</div>';
}

// ── STACKED BARS ────────────────────────────────────────
function stackedBars(years, datasets){
  const totals=years.map((_,i)=>datasets.reduce((s,d)=>s+d.data[i],0));
  const maxT=Math.max(...totals);
  return '<div class="sbarchart">'+years.map((yr,i)=>{
    const segs=datasets.map(d=>`<div class="sbc-seg" style="width:${(d.data[i]/maxT*100).toFixed(1)}%;background:${d.color}aa"></div>`).join('');
    return`<div class="sbc-row"><span class="sbc-label">${yr}</span><div class="sbc-track">${segs}</div></div>`;
  }).join('')+'</div>';
}

// ── DATA COVERAGE BOX ──────────────────────────────────
const COVERAGE = {
  vakivalta:   {years:'2015–2024', note:'Vuosi 2024 on viimeisin täysi vuosi. Vuoden 2025 Q1–Q3 ennakkotieto saatavilla Tilastokeskukselta mutta ei sisälly tähän tilastoon.'},
  seksuaali:   {years:'2015–2024', note:'Vuosi 2024 viimeisin täysi vuosi. Huom: seksuaalirikoslaki muuttui 1.1.2023 — lukuja ei voi suoraan verrata ennen/jälkeen.'},
  henki:       {years:'2015–2024', note:'Vuosi 2024 viimeisin täysi vuosi. 2025 Q1–Q3 ennakkotieto osoittaa jatkuvaa vaihtelua.'},
  ryostot:     {years:'2015–2024', note:'Vuosi 2024 viimeisin täysi vuosi. Vuoden 2022 piikki (+23 %) näkyy selkeästi trendikaaviossa.'},
  nuoriso:     {years:'2015–2024', note:'Vuosi 2024 viimeisin täysi vuosi. Alle 15-vuotiaiden tilasto ulottuu vuoteen 2024.'},
  perhe:       {years:'2009–2024', note:'Vuosi 2024 viimeisin täysi vuosi. Tilasto julkaistaan kerran vuodessa, ei neljännesvuosittain.'},
  maahanmuuttajat:{years:'2015–2024', note:'Luvut ovat arvioita Tilastokeskuksen aineistojen pohjalta, ei suoraan rajapinnasta.'},
  kansalaisuus:{years:'2024', note:'Yhden vuoden poikkileikkaus. Kansalaisuuskohtaista aikasarjaa ei julkaista suoraan.'},
  vangit:      {years:'2010–2025', note:'Rise-data on virallista. Päivittäinen tilanne 6.3.2026: 24,0 %. Koko vuoden 2025 tilasto julkaistaan 2026.'},
  'syntyperä': {years:'2015–2025', note:'Rise-data on virallista. Väestöosuusluvut Tilastokeskukselta.'}
};

function dataBox(id){
  const c=COVERAGE[id];
  if(!c) return '';
  return `<div class="dbox"><div class="dbox-dot"></div><span><strong>Ajanjakso: ${c.years}</strong> — ${c.note}</span></div>`;
}

// ── RENDER GENERIC CRIME ────────────────────────────────
const DATA={
  vakivalta:{col:'#e05c5c',counts:[43200,42600,41800,41200,40500,39800,40600,41300,41800,41500],p100k:[784,773,758,747,733,719,733,745,753,747],trendPct:-3.9,trend:'laskeva',analysis:'Vuosi 2015 näyttää korkealta osittain siksi, että lievien pahoinpitelyjen syyteoikeus muuttui vuonna 2011 — tämä nosti tilastoituja lukuja keinotekoisesti. Pitkä trendi on silti laskeva. Vuonna 2024 pahoinpitelyjä 41 500. Ajoittuminen on muuttunut: yhä useampi tapahtuu päiväsaikaan, mikä heijastaa nuorten tekemien pahoinpitelyjen kasvua.'},
  henki:{col:'#9b7de8',counts:[105,97,93,88,82,78,81,75,57,89],p100k:[1.91,1.76,1.69,1.60,1.49,1.41,1.46,1.35,1.03,1.60],trendPct:15.0,trend:'nouseva 2024',analysis:'Vuosi 2023 oli historiallisen matala (57). Vuonna 2024 luku nousi 89:ään — 32 enemmän — palaten 2010-luvun tasolle. Tappo 53 tapauksessa, murha 36.'},
  ryostot:{col:'#4f8ef7',counts:[3620,3480,3320,3150,2980,2810,2720,2650,2740,2600],p100k:[65.7,63.2,60.2,57.1,54.0,50.8,49.1,47.8,49.4,46.8],trendPct:-28.2,trend:'laskeva',analysis:'Ryöstöt ovat laskeneet tasaisesti. Vuonna 2024 ryöstöjä 2 600 (-5,1 %). Selvitysprosentti 59 %. Yöaikaiset ryöstöt vähentyneet, iltapäiväryöstöt yleistyneet.'},
  nuoriso:{col:'#e06898',counts:[16200,15800,15200,14700,14200,13800,14500,14100,13800,14400],p100k:[295,287,276,267,258,250,263,256,250,261],yShare:[18.2,17.8,17.1,16.5,15.9,15.4,16.1,15.7,15.2,15.8],trendPct:-11.1,trend:'laskeva pitkällä',analysis:'Vuoden 2015 piikki selittyy lastensuojelulain muutoksella (huhtikuu 2015): ilmoitusvelvollisuus laajeni ja koulut alkoivat ilmoittaa herkemmin oppilaiden rikosepäilyistä — todellinen rikollisuus ei kasvanut yhtä paljon kuin tilastot näyttävät. Kokonaismäärä on laskenut pitkällä aikavälillä. Silti alle 15-vuotiaiden pahoinpitelyt ovat aidosti kasvaneet — yleisin epäillyn ikä 2024 oli 14 vuotta (1 400 tapausta).'}
};

function renderCrime(id){
  const d=DATA[id];const el=document.getElementById('p-'+id);
  const lat=d.counts[9],prv=d.counts[8];
  const chg=((lat-prv)/prv*100);
  const chgH=chg>0?`<span class="tu">+${chg.toFixed(1)}%</span>`:`<span class="td">${chg.toFixed(1)}%</span>`;
  const tH=d.trendPct>2?`<span class="tu">+${d.trendPct.toFixed(1)}%</span>`:d.trendPct<-2?`<span class="td">${d.trendPct.toFixed(1)}%</span>`:`<span style="color:var(--muted)">vakaa</span>`;

  const yMin=Math.min(...d.counts)*0.95, yMax=Math.max(...d.counts)*1.03;
  const lc=lineChart([{data:d.counts,color:d.col,fill:true}],yMin,yMax);

  const c2data=id==='nuoriso'?d.yShare:d.p100k;
  const c2min=Math.min(...c2data)*0.9, c2max=Math.max(...c2data)*1.05;
  const lc2=lineChart([{data:c2data,color:d.col,fill:true}],c2min,c2max,id==='nuoriso'?v=>v.toFixed(1)+'%':v=>v.toFixed(1));

  let agExtra='';
  if(id==='nuoriso'){
    agExtra=`<div class="card"><div class="ctitle">Ikäryhmäjakauma 2024</div>`+
    hbars([{l:'Alle 15v',v:14.2,c:d.col,fmt:'14,2 %'},{l:'15–17v',v:31.4,c:d.col,fmt:'31,4 %'},{l:'18–19v',v:54.4,c:d.col,fmt:'54,4 %'}])+
    '</div>';
  }

  el.innerHTML=`
  ${dataBox(id)}
  ${id==='nuoriso'?'<div class="ibox"><strong>Miksi 2015 näyttää korkealta?</strong> Lastensuojelulaki muuttui huhtikuussa 2015 — ilmoitusvelvollisuus laajeni ja koulut alkoivat ilmoittaa herkemmin rikosepäilyistä. Tilastoitu kasvu ei tarkoita että rikollisuus todella kasvoi yhtä paljon.</div>':''}
  ${id==='vakivalta'?'<div class="ibox"><strong>Miksi 2015 näyttää korkealta?</strong> Lievien pahoinpitelyjen syyteoikeuden muutos (2011) nosti tilastoituja lukuja. Vuosi 2015 on vertailujakson lähtövuosi — pitkä trendi on silti laskeva.</div>':''}
  <div class="metrics">
    <div class="mc"><div class="mlabel">Tapauksia 2024</div><div class="mval r">${fi(lat)}</div><div class="msub">${chgH} vs. 2023</div></div>
    <div class="mc"><div class="mlabel">Per 100 000</div><div class="mval">${d.p100k[9].toFixed(1)}</div></div>
    <div class="mc mc3"><div class="mlabel">Muutos 2015–2024</div><div class="mval">${tH}</div><div class="msub">${d.trend}</div></div>
  </div>
  <div class="card"><div class="ctitle">Vuositrendi 2015–2024</div><div class="csub">Viranomaisten tietoon tulleet tapaukset</div>${lc}</div>
  ${agExtra}
  <div class="card"><div class="ctitle">${id==='nuoriso'?'Osuus kaikista epäillyistä':'Per 100 000 asukasta'}</div>${lc2}</div>
  <div class="abox">${d.analysis}</div>`;
}

// ── SEKSUAALIRIKOKSET ───────────────────────────────────
function renderSeksuaali(){
  const el=document.getElementById('p-seksuaali');
  const R=[1050,1090,1020,1060,1110,1200,1450,1669,1888,2050];
  const L=[1200,1250,1180,1220,1300,1450,1820,2100,3475,4986];
  const A=[430,450,420,410,390,380,560,580,1139,1050];
  const K=[0,0,0,0,0,0,0,0,146,190];
  const T=[3820,3900,3750,3820,3900,4100,5400,5500,7100,8900];
  const M=T.map((t,i)=>Math.max(0,t-R[i]-L[i]-A[i]-K[i]));
  const UR=[22,23,24,25,26,28,30,33,38,40];
  const UV=[3.8,4.0,4.2,4.5,4.8,5.0,5.1,5.3,5.5,5.7];

  const lc1=lineChart([
    {data:R,color:'#e05c5c',fill:false,width:2},
    {data:L,color:'#e8a23a',fill:false,width:2},
    {data:A,color:'#9b7de8',fill:false,width:1.5,dash:'4,3'}
  ],0,5500);

  const lc2=lineChart([
    {data:UR,color:'#e05c5c',fill:true,width:2},
    {data:UV,color:'#7a8099',fill:false,width:1.5,dash:'4,3'}
  ],0,50,v=>v+'%');

  el.innerHTML=`
  ${dataBox('seksuaali')}
  <div class="ibox amber"><strong>Lainmuutoshuomio:</strong> Seksuaalirikoslaki uudistui 1.1.2023. Raiskauksen määritelmä muuttui suostumusperusteiseksi. Lukuja ennen ja jälkeen 2023 ei voi suoraan verrata.</div>
  <div class="metrics">
    <div class="mc"><div class="mlabel">Yhteensä 2024</div><div class="mval r">8 900</div><div class="msub"><span class="tu">+25%</span> vs. 2023</div></div>
    <div class="mc"><div class="mlabel">Lapsiin kohdistuvat</div><div class="mval r">4 986</div><div class="msub"><span class="tu">+43%</span> vs. 2023</div></div>
    <div class="mc mc3"><div class="mlabel">Ulkomaalaisten osuus raiskausepäillyistä</div><div class="mval r">~40 %</div><div class="msub">väestöosuus ~6 %</div></div>
  </div>
  <div class="card">
    <div class="ctitle">Alakategoriat 2015–2024</div>
    <div class="legend">

// ── NAV ─────────────────────────────────────────────────
function go(el){
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const id=el.dataset.p;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  document.getElementById('ttitle').textContent=TITLES[id]||id;
  window.scrollTo({top:0,behavior:'smooth'});
  const panel=document.getElementById('p-'+id);
  if(!panel.dataset.done){
    panel.dataset.done='1';
    render(id);
  }
}

function render(id){
  if(['vakivalta','henki','ryostot','nuoriso'].includes(id)) renderCrime(id);
  else if(id==='seksuaali') renderSeksuaali();
  else if(id==='perhe') renderPerhe();
  else if(id==='maahanmuuttajat') renderMaahanmuuttajat();
  else if(id==='kansalaisuus') renderKansalaisuus();
  else if(id==='vangit') renderVangit();
  else if(id==='syntyperä') renderSyntyperä();
  else if(id==='ennakko2025') renderEnnakko2025();
  else if(id==='ika') renderIka();
}

      <span class="li"><span class="ld" style="background:#e05c5c"></span>Ulkomaalaistaustainen</span>
      <span class="li"><span class="ld" style="background:#7a8099"></span>Kantaväestö</span>
    </div>
    <div class="barchart">
      ${ageGroups.map(g=>`
      <div style="margin-bottom:10px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${g.l}${g.note?` <span style="color:var(--dim)">— ${g.note}</span>`:''}</div>
        <div class="bc-row" style="margin-bottom:3px">
          <span style="font-size:10px;color:var(--dim);min-width:80px">Ulkomaal.</span>
          <div class="bc-track"><div class="bc-fill" style="width:${(g.ulk/maxAge*100).toFixed(0)}%;background:#e05c5c"></div></div>
          <span class="bc-val">${g.ulk} %</span>
        </div>
        <div class="bc-row">
          <span style="font-size:10px;color:var(--dim);min-width:80px">Kantaväestö</span>
          <div class="bc-track"><div class="bc-fill" style="width:${(g.suom/maxAge*100).toFixed(0)}%;background:#7a8099"></div></div>
          <span class="bc-val">${g.suom} %</span>
        </div>
      </div>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="ctitle">Seksuaalirikosepäillyt — yliedustuskerroin (Suomi = 1x)</div>
    <div class="csub">Ikä- ja sukupuolivakioitu · Lähde: Tilastokeskus 2017–2018</div>
    <div class="ibox amber" style="margin-bottom:12px"><strong>Huomio:</strong> Nämä luvut ovat ikä- ja sukupuolivakioituja — eli ne ottavat huomioon että maahanmuuttajaväestö on nuorempaa. Luvut kuvaavat rikosepäilyjä, ei tuomioita.</div>
    ${hbars(sexCrimeRatio.map(r=>({l:r.l,v:r.v,c:r.c,fmt:r.v.toFixed(1)+'x'})))}
  </div>

  <div class="card">
    <div class="ctitle">Nuoret ulkomaalaistaustaisten rikoksissa — avainluvut</div>
    ${hbars([
      {l:'Osuus alle 18v ryöstöepäillyistä',v:35,c:'#e05c5c',fmt:'~35 %'},
      {l:'Osuus alle 18v väestöstä',v:14,c:'#7a8099',fmt:'~14 %'},
      {l:'Pahoinp./ryöstö epäily — ulkomaalaistaustainen nuori',v:1.0,c:'#e8a23a',fmt:'~1 %/v'},
      {l:'Pahoinp./ryöstö epäily — suomalaistaustainen nuori',v:0.3,c:'#4a5068',fmt:'~0,3 %/v'},
    ])}
    <div style="font-size:11px;color:var(--dim);margin-top:8px">Lähde: Tilastokeskus Tieto&amp;trendit 2023 — Espoo esimerkkinä, vaihtelu kaupungeittain suuri</div>
  </div>

  <div class="abox">Ulkomaalaistaustaisten epäiltyjen ikärakenne on selvästi nuorempi kuin kantaväestön — painottuu alle 30-vuotiaisiin. Seksuaalirikoksissa yliedustus on suurin: irakilaiset miehet epäiltynä 12,8x useammin kuin suomalaiset miehet ikä- ja sukupuolivakioituna. Nuorten (alle 18v) osalta noin 1 % ulkomaalaistaustaista nuorta on epäiltynä pahoinpitelystä tai ryöstöstä vuosittain, kantaväestöllä 0,3 %. Tärkeää huomata: valtaosa — 99 % — ulkomaalaistaustaisistakin nuorista ei ole syyllistynyt rikoksiin.</div>`;
}

// ── 2025 ENNAKKOTIEDOT ───────────────────────────────────
// Lähde: Tilastokeskus, rikos- ja pakkokeinotilasto 2025 Q3 (julk. 17.10.2025)
// Luvut ovat tammi–syyskuun 2025 ennakkotietoja — ei vertailukelpoisia koko vuoden tilastoihin
function renderEnnakko2025(){
  const el=document.getElementById('p-ennakko2025');

  // Q1–Q3 2025 vs Q1–Q3 2024 (Tilastokeskus 17.10.2025)
  const cats=[
    {l:'Pahoinpitelyt',v25:32100,v24:30900,c:'#e05c5c',note:'Kasvu etenkin yksityisasunnoissa (+5,6 %)'},
    {l:'Seksuaalirikokset',v25:7800,v24:7100,c:'#e8a23a',note:'Kasvutrendi jatkuu'},
    {l:'Henkirikokset',v25:61,v24:68,c:'#9b7de8',note:'Lasku — mutta yritykset kasvoivat +33 kpl'},
    {l:'Ryöstöt',v25:null,v24:2000,c:'#4f8ef7',note:'Q3 data ei eritelty erikseen'},
    {l:'Varkaudet',v25:108000,v24:96600,c:'#3dba8c',note:'Merkittävä kasvu +9,7 % — ei dashboardissa erikseen'},
  ].filter(c=>c.v25!==null);

  const maxV=Math.max(...cats.map(c=>Math.max(c.v25,c.v24)));

  const rows=cats.map(c=>{
    const chg=((c.v25-c.v24)/c.v24*100);
    const chgTxt=(chg>0?'+':'')+chg.toFixed(1)+'%';
    const chgCol=chg>0?'var(--red)':'var(--green)';
    return`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
        <span style="font-size:13px;font-weight:500">${c.l}</span>
        <span style="font-size:15px;font-weight:500;color:${chgCol}">${chgTxt}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
        <div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Q1–Q3 2024</div>
          <div style="height:8px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:3px">
            <div style="height:100%;width:${(c.v24/maxV*100).toFixed(1)}%;background:${c.c}55;border-radius:3px"></div>
          </div>
          <div style="font-size:12px;color:var(--muted)">${fi(c.v24)}</div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Q1–Q3 2025</div>
          <div style="height:8px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:3px">
            <div style="height:100%;width:${(c.v25/maxV*100).toFixed(1)}%;background:${c.c};border-radius:3px"></div>
          </div>
          <div style="font-size:12px;font-weight:500">${fi(c.v25)}</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--dim)">${c.note}</div>
    </div>`;
  }).join('');

  el.innerHTML=`
  <div class="ibox amber">
    <strong>Huomio: ennakkotieto, osavuosi</strong> — Nämä luvut kattavat tammi–syyskuun 2025 (Q1–Q3). Ne eivät ole vertailukelpoisia dashboardin vuositilastoihin (2015–2024). Tilastokeskus julkaisee koko vuoden 2025 tilaston arviolta kesällä 2026.
  </div>
  <div style="font-size:11px;color:var(--dim);margin-bottom:14px">Lähde: Tilastokeskus, rikos- ja pakkokeinotilasto 2025, 3. vuosineljännes (julk. 17.10.2025)</div>
  ${rows}
  <div class="abox">Vuoden 2025 ennakkotiedot osoittavat huolestuttavia trendejä: pahoinpitelyt ovat kääntyneet kasvuun (+3,8 %) 2024 laskun jälkeen, seksuaalirikokset jatkavat kasvuaan, ja varkaudet ovat kasvaneet peräti 9,7 % — mikä on poikkeuksellisen suuri muutos. Henkirikokset ovat laskeneet (61 vs. 68), mutta henkirikoksen yritykset kasvoivat 33 tapauksella.</div>`;
}

// ── INIT — no external deps needed ──────────────────────
renderCrime('vakivalta');
document.getElementById('p-vakivalta').dataset.done='1';
</script>
